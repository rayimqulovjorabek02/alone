# infra/docker-compose.prod.yml — Ishlab chiqarish konfiguratsiyasi
version: "3.9"

services:
  # ─── Traefik ───
  traefik:
    image: traefik:v3.0
    container_name: alone-traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik.yml:/traefik.yml:ro
      - traefik-certs:/letsencrypt
      - traefik-logs:/var/log/traefik
    networks: [alone-network]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`traefik.aloneai.uz`)"
      - "traefik.http.routers.dashboard.tls=true"
      - "traefik.http.routers.dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.middlewares=auth-middleware"
      - "traefik.http.middlewares.auth-middleware.basicauth.users=admin:$$2y$$10$$..."

  # ─── Backend ───
  backend:
    image: ghcr.io/yourusername/alone-ai/backend:latest
    container_name: alone-backend
    restart: unless-stopped
    env_file: ../.env
    volumes:
      - alone-data:/app/data
      - alone-uploads:/app/uploads
    networks: [alone-network]
    healthcheck:
      test:     ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout:  10s
      retries:  3
      start_period: 40s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`aloneai.uz`) && PathPrefix(`/api`)"
      - "traefik.http.routers.backend.tls=true"
      - "traefik.http.routers.backend.tls.certresolver=letsencrypt"
      - "traefik.http.routers.backend-ws.rule=Host(`aloneai.uz`) && PathPrefix(`/api/chat/ws`)"
      - "traefik.http.routers.backend-ws.tls=true"
      - "traefik.http.services.backend.loadbalancer.server.port=8000"
      # Rate limiting
      - "traefik.http.middlewares.ratelimit.ratelimit.average=100"
      - "traefik.http.middlewares.ratelimit.ratelimit.burst=50"

  # ─── Frontend ───
  frontend:
    image: nginx:alpine
    container_name: alone-frontend
    restart: unless-stopped
    volumes:
      - ../frontend/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks: [alone-network]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`aloneai.uz`)"
      - "traefik.http.routers.frontend.tls=true"
      - "traefik.http.routers.frontend.tls.certresolver=letsencrypt"
      - "traefik.http.routers.frontend.priority=1"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"

  # ─── Redis (kesh uchun — kelajakda) ───
  # redis:
  #   image: redis:7-alpine
  #   container_name: alone-redis
  #   restart: unless-stopped
  #   networks: [alone-network]
  #   volumes:
  #     - redis-data:/data

volumes:
  alone-data:
  alone-uploads:
  traefik-certs:
  traefik-logs:
  # redis-data:

networks:
  alone-network:
    external: true